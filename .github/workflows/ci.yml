name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          set -x
          npm install
      
      - name: TypeScript check
        run: |
          set -x
          npx tsc --noEmit
      
      - name: Build application
        run: |
          set -x
          npm run build
